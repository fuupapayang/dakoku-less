name: Build & Release

on:
  push:
    tags: ['v*']        # 例: v0.1.0 のタグを push すると実行
  workflow_dispatch:     # 手動実行も可(Actionsタブから)

permissions:
  contents: write        # Releaseへのアップロードに必要

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifact: 'dist/*.dmg'
          - os: windows-latest
            script: dist:win
            artifact: 'dist/*.exe'
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # コード署名なしでビルド(無料運用)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build installer
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dakoku-less-${{ matrix.os }}
          path: ${{ matrix.artifact }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
