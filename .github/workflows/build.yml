name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: 'dist/*.dmg'
          - os: windows-latest
            artifact: 'dist/*.exe'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      # macOS: 署名 + 公証(secretsがあるとき)
      - name: Build macOS (signed & notarized)
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac -- --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Windows: 署名なし(証明書env は一切渡さない)
      - name: Build Windows (unsigned)
        if: matrix.os == 'windows-latest'
        run: npm run dist:win -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dakoku-less-${{ matrix.os }}
          path: ${{ matrix.artifact }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
