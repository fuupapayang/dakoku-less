<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'">
<title>全自動勤怠管理くん</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="dot"></span> 全自動勤怠管理くん</div>
    <nav id="nav">
      <button class="nav-btn active" data-tab="today">今日の勤務</button>
      <button class="nav-btn" data-tab="dashboard">ダッシュボード</button>
      <button class="nav-btn" data-tab="history">履歴</button>
      <button class="nav-btn" data-tab="projects">案件</button>
      <button class="nav-btn" data-tab="calendar">カレンダー</button>
      <button class="nav-btn" data-tab="rules">マイルール</button>
      <button class="nav-btn" data-tab="settings">設定</button>
      <div class="nav-sep">ADMIN</div>
      <button class="nav-btn" data-tab="admin">管理者ビュー</button>
    </nav>
    <div class="privacy-note">
      🔒 ログはメモリ上で推論後、即時削除。残るのは「何時から何時まで働いたか」だけです。
    </div>
  </aside>

  <main class="main">
    <section id="tab-today" class="tab active"></section>
    <section id="tab-dashboard" class="tab"></section>
    <section id="tab-history" class="tab"></section>
    <section id="tab-projects" class="tab"></section>
    <section id="tab-calendar" class="tab"></section>
    <section id="tab-rules" class="tab"></section>
    <section id="tab-settings" class="tab"></section>
    <section id="tab-admin" class="tab"></section>
  </main>
</div>
<div id="modal-root"></div>
<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
